name: Build Consolidated Spells JSON

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  # Also run on push to main (when you update the script)
  push:
    branches: [main]
    paths:
      - 'build_spells_repo.js'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: node build_spells_repo.js

      - name: Commit and push generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spells_consolidated.json spells_consolidated.min.json
          git diff --cached --quiet || git commit -m "Auto-generate consolidated spells JSON"
          git push
